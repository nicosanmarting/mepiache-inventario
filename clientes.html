<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Mepiache | Clientes</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .badge.activo   { background-color: #e3f3e1; color: #2e7d32; }
    .badge.inactivo { background-color: #f0f0f0; color: #666; }

    .contacto-cell {
      font-size: 13px;
      white-space: nowrap;
    }

    .contacto-cell div + div {
      margin-top: 2px;
      color: #8a7a5c;
    }
  </style>
</head>
<body>

  <div id="app-layout">
    <main>

      <a href="inicio.html" class="volver">&larr; Inicio</a>

      <div class="panel-titulo">
        <h2>Clientes frecuentes</h2>
        <button id="btn-nuevo-cliente">+ Nuevo cliente</button>
      </div>

      <p style="color: #8a7a5c; font-size: 14px; margin-top: -8px;">
        Esta lista alimenta el selector "Cliente" en Venta / salida, para registrar a quién se vendió.
      </p>

      <!-- Formulario: nuevo / editar cliente -->
      <div class="form-card form-card-toggle" id="form-cliente" style="display: none; max-width: 100%;">
        <h3 id="form-titulo" style="margin-top: 0;">Nuevo cliente</h3>
        <input type="hidden" id="cl-id">

        <div class="form-row dos-columnas">
          <div>
            <label for="cl-nombre">Nombre *</label>
            <input type="text" id="cl-nombre" placeholder="Ej: Minimarket Los Aromos">
          </div>
          <div>
            <label for="cl-telefono">Teléfono de contacto</label>
            <input type="text" id="cl-telefono" placeholder="Ej: +56 9 1234 5678">
          </div>
        </div>

        <div class="form-row">
          <label for="cl-email">Email de contacto</label>
          <input type="email" id="cl-email" placeholder="Ej: contacto@cliente.cl">
        </div>

        <div class="form-row" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
          <button id="btn-guardar-cliente">Guardar</button>
          <button class="secundario" id="btn-cancelar-cliente">Cancelar</button>
        </div>
        <div class="form-mensaje" id="cl-mensaje"></div>
      </div>

      <!-- Filtros -->
      <div class="filtros">
        <input type="text" id="filtro-cliente" placeholder="Buscar por nombre...">
        <div class="form-row checkbox" style="margin-bottom: 0;">
          <input type="checkbox" id="filtro-inactivos">
          <label for="filtro-inactivos">Mostrar inactivos</label>
        </div>
      </div>

      <div class="form-mensaje" id="lista-mensaje"></div>

      <!-- Tabla de clientes -->
      <div class="tabla-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Contacto</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-clientes-body">
            <tr><td colspan="4" class="estado-vacio">Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <footer>
    Sistema de inventario interno · Mepiache
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/ui-helpers.js"></script>
  <script src="js/clientes.js"></script>
</body>
</html>
