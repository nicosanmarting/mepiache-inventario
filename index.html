<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Mepiache | Inventario</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="logo">Mepiache</div>
    <div class="subtitulo">Inventario</div>

    <form id="form-login">
      <div class="form-row">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.cl" required>
      </div>
      <div class="form-row">
        <label for="clave">Contraseña</label>
        <input type="password" id="clave" name="clave" placeholder="••••••••" required>
      </div>
      <p class="login-error" id="login-error">Email o contraseña incorrectos.</p>
      <button type="submit" id="btn-login">Ingresar</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
